name: Test
run-name: $({ github.actor }) running tests
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update
      - run: sudo apt-get install -y gdb-multiarch
      - run: rustup update stable && rustup default stable
      - run: cargo test
